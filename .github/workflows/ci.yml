name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Swift build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build -c release
