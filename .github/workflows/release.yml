name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  package:
    name: Build DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build app, ZIP, and DMG
        env:
          ALLOW_SINGLE_ARCH_FALLBACK: "0"
        run: ./scripts/make_dmg.sh "${{ steps.meta.outputs.version }}"

      - name: Release notes
        run: |
          cat > build/RELEASE_NOTES.md <<'EOF'
          Claude Sessions ${{ steps.meta.outputs.version }}

          Native macOS command center for Claude Code transcripts.

          Highlights:
          - Browse, read, favorite, archive, trash, copy, and rename Claude Code sessions.
          - Supercompact huge JSONL sessions into clean resumable continuations.
          - Export to Markdown, JSON, Codex CLI, and Gemini CLI.
          - Edit safely: saves fork into a new session; originals survive.
          - Continuous backup with optional LaunchAgent daemon.
          - Optional localhost MCP server for agent control.

          Build:
          - Universal macOS binary: arm64 + x86_64.
          - Ad-hoc signed, not notarized. If Gatekeeper blocks first launch, right-click the app and choose Open.
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Sessions-${{ steps.meta.outputs.version }}
          path: |
            build/Claude-Sessions-${{ steps.meta.outputs.version }}.dmg
            build/Claude-Sessions-${{ steps.meta.outputs.version }}.zip
            build/SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          ASSETS=(
            "build/Claude-Sessions-${VERSION}.dmg"
            "build/Claude-Sessions-${VERSION}.zip"
            "build/SHA256SUMS.txt"
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes-file build/RELEASE_NOTES.md
          fi
